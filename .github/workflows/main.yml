name: Build Kostyan Mod

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$GITHUB_WORKSPACE/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build mod
        run: gradle build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: kostyan-mod
          path: build/libs/kostyanmod-*.jar
          if-no-files-found: warn
