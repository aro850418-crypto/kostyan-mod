name: Build Kostyan Mod

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Cache ForgeGradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-forgegradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-forgegradle-

      - name: Build mod
        run: gradle build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"

      - name: List build outputs
        run: ls -la build/libs/ || echo "No build/libs directory found"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: kostyan-mod
          path: build/libs/kostyanmod-*.jar
          if-no-files-found: warn
