name: Build Kostyan Mod

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"

      - name: List build outputs
        run: find build/libs -name "*.jar" 2>/dev/null || echo "No JAR files found"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: kostyan-mod
          path: build/libs/kostyanmod-*.jar
          if-no-files-found: warn
